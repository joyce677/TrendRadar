name: Hot News Crawler

on:
  schedule:
    - cron: '*/50 * * * *'  # 每50分钟运行一次
  workflow_dispatch:

# 添加权限设置
permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pytz
    
    - name: Create frequency_words.txt if not exists
      run: |
        if [ ! -f frequency_words.txt ]; then
          echo "Creating empty frequency_words.txt file"
          touch frequency_words.txt
        fi
    
    - name: Run crawler
      env:
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
        WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
        GITHUB_ACTIONS: true
      run: python main.py
    
    - name: Commit and push if changes
      run: |
        # 配置Git用户信息
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        
        # 将所有更改（新文件、修改、删除）添加到暂存区
        git add -A
        
        # 检查是否有文件变动。如果没有，则不执行任何操作。
        # git diff --staged --quiet 会检查暂存区是否有变动
        if git diff --staged --quiet; then
          echo "No changes to commit."
        else
          echo "Changes detected. Committing and pushing..."
          # 提交更改，使用上海时间
          git commit -m "Auto update by GitHub Actions at $(TZ=Asia/Shanghai date)"
          
          # 在推送前，先拉取远程的最新更改并变基
          # 这可以解决 "rejected" 错误
          git pull --rebase
          
          # 推送提交到远程仓库
          git push
        fi
